name: Weekly Recommendations

on:
  schedule:
    - cron: '0 4 * * 1' # Every Monday at 04:00 UTC
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Last.fm data (for seeds)
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: node scripts/fetch-lastfm.js

      # Try Spotify first. If the app owner doesn't have Premium (403), 
      # automatically fall back to Last.fm similar tracks/artists.
      - name: Fetch recommendations (Spotify → Last.fm fallback)
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          echo "Attempting Spotify recommendations..."
          node scripts/fetch-spotify.js || (
            echo "Spotify failed (likely Premium required). Falling back to Last.fm..." &&
            node scripts/fetch-recommendations-fallback.js
          )

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --staged --quiet || (git commit -m 'chore: update weekly recommendations' && git push)
