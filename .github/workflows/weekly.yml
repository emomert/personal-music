name: Weekly Recommendations

on:
  schedule:
    - cron: '0 4 * * 1' # Every Monday at 04:00 UTC
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Last.fm data (for seeds)
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: node scripts/fetch-lastfm.js

      # Hybrid Spotify+Last.fm engine. Exit codes from fetch-spotify.js:
      #   0 = success, 1 = data/runtime error, 2 = creds missing, 3 = Spotify auth failed.
      # We only fall back to pure Last.fm on missing creds (2) or auth failure (3),
      # not on transient errors (1) where overwriting good data would be worse.
      - name: Fetch recommendations (multi-source: Last.fm + ListenBrainz + tag-walk, Spotify-enriched)
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LISTENBRAINZ_TOKEN: ${{ secrets.LISTENBRAINZ_TOKEN }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          set +e
          node scripts/fetch-spotify.js
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "Hybrid engine succeeded."
            exit 0
          fi
          if [ "$status" -eq 2 ] || [ "$status" -eq 3 ]; then
            echo "Spotify unavailable (exit=$status) — falling back to Last.fm-only similarity."
            node scripts/fetch-recommendations-fallback.js
          else
            echo "Hybrid engine failed with exit=$status (not an auth/config issue) — leaving recommendations.json untouched."
            exit "$status"
          fi

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --staged --quiet || (git commit -m 'chore: update weekly recommendations' && git push)
