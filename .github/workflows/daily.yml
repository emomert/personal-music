name: Daily Data Fetch

on:
  schedule:
    - cron: '0 3 * * *' # Every day at 03:00 UTC
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Last.fm data
        env:
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
        run: node scripts/fetch-lastfm.js

      - name: Fetch ListenBrainz data
        env:
          LISTENBRAINZ_TOKEN: ${{ secrets.LISTENBRAINZ_TOKEN }}
        run: node scripts/fetch-listenbrainz.js

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/
          git diff --staged --quiet || (git commit -m 'chore: update daily music data' && git push)
